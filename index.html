<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portefeuille de Compétences</title>
<style>
:root{
  --paper:#f6f3ec;
  --ink:#1f2418;
  --ink-soft:#5a5f52;
  --spec:#3c6b35;
  --spec-soft:#e3ecdf;
  --trans:#3f6a8c;
  --trans-soft:#dfe9f1;
  --soft:#c4407a;
  --soft-soft:#f7e1ec;
  --line:#d8d2c2;
  --paper-card:#fffdf8;
  --niv-a:#3c6b35;
  --niv-b:#b3781e;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:'Iowan Old Style','Georgia',serif;min-height:100vh;}
::selection{background:#d6cdb0;}

.site-header{padding:48px 32px 24px;border-bottom:3px solid var(--ink);}
.eyebrow{font-family:'Courier New',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);margin:0 0 6px;}
h1.title{font-family:'Iowan Old Style','Georgia',serif;font-weight:700;font-size:clamp(32px,5vw,54px);margin:0;letter-spacing:-0.01em;line-height:1.02;}
.subtitle{font-family:'Courier New',monospace;font-size:14px;color:var(--ink-soft);margin-top:10px;max-width:620px;}

.layout{display:flex;max-width:1280px;margin:0 auto;min-height:calc(100vh - 160px);}

.binder{width:280px;flex-shrink:0;padding:36px 0 36px 28px;border-right:3px solid var(--ink);}
.binder-label{font-family:'Courier New',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin:0 0 18px 4px;}
.tab{display:block;width:100%;text-align:left;background:var(--paper-card);border:2px solid var(--ink);border-right:none;border-radius:8px 0 0 8px;padding:16px 18px;margin-bottom:14px;cursor:pointer;font-family:'Iowan Old Style','Georgia',serif;font-size:16px;font-weight:700;color:var(--ink);transform:translateX(18px);transition:transform .25s ease,box-shadow .25s ease;}
.tab .tab-eyebrow{display:block;font-family:'Courier New',monospace;font-weight:400;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;opacity:.65;}
.tab.spec{border-left:10px solid var(--spec);}
.tab.trans{border-left:10px solid var(--trans);}
.tab.soft{border-left:10px solid var(--soft);}
.tab:hover{transform:translateX(8px);}
.tab.active{transform:translateX(0);box-shadow:-6px 6px 0 rgba(31,36,24,0.08);}
.tab.spec.active{background:var(--spec-soft);}
.tab.trans.active{background:var(--trans-soft);}
.tab.soft.active{background:var(--soft-soft);}

.content{flex:1;padding:40px 40px 60px;min-width:0;}
.cat-header{margin-bottom:28px;}
.cat-header .cat-eyebrow{font-family:'Courier New',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:6px;}
.cat-header h2{font-size:clamp(24px,3vw,32px);margin:0;line-height:1.15;}
.cat-header .niv{font-family:'Courier New',monospace;font-size:13px;margin-top:8px;color:var(--ink-soft);}

.ac-nav{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:30px;}
.ac-pill{font-family:'Courier New',monospace;font-size:12.5px;padding:9px 14px;border:1.5px solid var(--ink);border-radius:20px;background:var(--paper-card);cursor:pointer;color:var(--ink);transition:all .15s ease;white-space:nowrap;}
.ac-pill:hover{transform:translateY(-1px);}
.ac-pill.active.spec{background:var(--spec);color:#fff;border-color:var(--spec);}
.ac-pill.active.trans{background:var(--trans);color:#fff;border-color:var(--trans);}
.ac-pill.active.soft{background:var(--soft);color:#fff;border-color:var(--soft);}
.ac-pill.empty{opacity:.45;font-style:italic;}

.ac-card{background:var(--paper-card);border:2px solid var(--ink);border-radius:4px;padding:32px 36px;animation:fadein .35s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.ac-card .ac-code{font-family:'Courier New',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;}
.ac-card h3{font-size:22px;margin:0 0 22px;line-height:1.3;padding-bottom:18px;border-bottom:1.5px dashed var(--line);}
.field{margin-bottom:18px;}
.field-label{font-family:'Courier New',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:5px;}
.field-value{font-size:15px;line-height:1.55;}
.field-value.empty{color:var(--ink-soft);font-style:italic;}
.niveau-badge{display:inline-flex;align-items:center;font-family:'Courier New',monospace;font-size:13px;font-weight:700;padding:5px 12px;border-radius:20px;margin-bottom:6px;}
.niveau-badge.a{background:#e3ecdf;color:var(--niv-a);}
.niveau-badge.b{background:#f6ead2;color:var(--niv-b);}
.empty-state{padding:50px 20px;text-align:center;color:var(--ink-soft);font-family:'Courier New',monospace;font-size:14px;}

/* PHOTOS */
.photos-section{margin-top:26px;border-top:1.5px dashed var(--line);padding-top:20px;}
.photo-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:10px;}
.photo-slot{aspect-ratio:1;border-radius:6px;overflow:hidden;background:var(--paper);border:1.5px solid var(--line);}
.photo-slot img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-slot.empty-slot{display:flex;align-items:center;justify-content:center;border:2px dashed var(--line);}
.photo-slot.empty-slot span{font-family:'Courier New',monospace;font-size:11px;color:var(--line);}
.photo-hint{font-family:'Courier New',monospace;font-size:11px;color:var(--ink-soft);margin-top:8px;}

footer{text-align:center;padding:24px;font-family:'Courier New',monospace;font-size:11px;color:var(--ink-soft);border-top:1px solid var(--line);}

@media(max-width:860px){
  .layout{flex-direction:column;}
  .binder{width:100%;border-right:none;border-bottom:3px solid var(--ink);padding:24px 20px;}
  .tab{transform:none;border-radius:8px;border-right:2px solid var(--ink);}
  .tab:hover,.tab.active{transform:none;}
  .content{padding:28px 20px 50px;}
  .ac-card{padding:24px 20px;}
  .photo-grid{grid-template-columns:repeat(3,1fr);}
}
@media(max-width:480px){.photo-grid{grid-template-columns:repeat(2,1fr);}}
@media(prefers-reduced-motion:reduce){.tab,.ac-pill,.ac-card{transition:none;animation:none;}}
</style>
</head>
<body>

<header class="site-header">
  <p class="eyebrow">Portefeuille de compétences — Année 2025/2026</p>
  <h1 class="title">Dossier de compétences</h1>
  <p class="subtitle">Spécialité, transversal et savoir-être en entreprise. Choisissez une compétence puis naviguez entre les AC.</p>
</header>

<div class="layout">
  <nav class="binder" id="binder"><p class="binder-label">Compétences</p></nav>
  <main class="content" id="content"></main>
</div>

<footer>Portefeuille de compétences — usage personnel</footer>

<script>
const DATA = [
  {
    id:"spec", cls:"spec",
    eyebrow:"Compétence de spécialité",
    title:"Développer un écosystème numérique complexe",
    niveau:"Niveau 3",
    acs:[
      {
        code:"AC33.01",
        titre:"Développer à l'aide d'un framework de développement côté client",
        realisation:"", ma_part:"", justification:"", argumentation:""
      },
      {
        code:"AC33.02",
        titre:"Développer à l'aide d'un framework de développement côté serveur",
        realisation:"", ma_part:"", justification:"", argumentation:""
      },
      {
        code:"AC33.03",
        titre:"Développer des dispositifs interactifs sophistiqués",
        realisation:"Unity — Jeu Endless Runner 3D",
        ma_part:"Développement complet du jeu en autonomie.",
        justification:"Le jeu intègre une boucle de jeu, plusieurs niveaux, une gestion des collisions, un système de score et des animations, le tout en C#. C'est un dispositif interactif sophistiqué développé de A à Z.",
        argumentation:"Niveau A — Le jeu était fonctionnel et jouable. Le manque de temps a limité le polish visuel et quelques détails de gameplay. À améliorer : les transitions entre niveaux et un système de sauvegarde du score.",
        niveau_lettre:"A",
        photos:["AC3303_1","AC3303_2","AC3303_3","AC3303_4","AC3303_5"]
      },
      {
        code:"AC33.04",
        titre:"Concevoir et développer des composants logiciels, plugins ou extensions",
        realisation:"Application Flutter — Itinéraire",
        ma_part:"Développement de l'application de bout en bout.",
        justification:"L'app nécessitait l'intégration de plugins (cartes, géolocalisation, stockage) et le développement de composants réutilisables propres au projet.",
        argumentation:"Niveau A — Application parfaitement fonctionnelle, très satisfait du résultat. À approfondir : la gestion d'état (BLoC/Provider) et les tests unitaires sur les composants critiques.",
        niveau_lettre:"A",
        photos:["AC3304_1","AC3304_2","AC3304_3","AC3304_4","AC3304_5"]
      },
      {
        code:"AC33.05",
        titre:"Maîtriser l'hébergement et le déploiement d'applications",
        realisation:"Hébergement Docker — conteneurisation sous Linux",
        ma_part:"Mise en place des conteneurs et configuration du serveur Linux.",
        justification:"J'ai rédigé des Dockerfiles, utilisé Docker Compose pour orchestrer plusieurs conteneurs (app, base de données, reverse proxy) et administré le tout sur un serveur Linux.",
        argumentation:"Compétence entièrement nouvelle pour moi : j'ai dû apprendre Docker et Linux en même temps. Réussir à faire tourner la stack complète est une vraie satisfaction. À viser : une pipeline CI/CD et l'exploration de Kubernetes.",
        niveau_lettre:"",
        photos:["AC3305_1","AC3305_2","AC3305_3","AC3305_4","AC3305_5"]
      }
    ]
  },
  {
    id:"trans", cls:"trans",
    eyebrow:"Compétence transversale",
    title:"Entreprendre dans le secteur du numérique",
    niveau:"Niveau 3",
    acs:[
      {
        code:"AC35.01",
        titre:"Piloter un produit, un service ou une équipe",
        realisation:"Projet Entrepreneuriat — pilotage d'équipe",
        ma_part:"Répartition des tâches, suivi de l'avancement, arbitrage des décisions.",
        justification:"J'ai coordonné l'équipe sur l'ensemble du projet : définition des priorités, attribution des tâches selon les compétences de chacun et maintien de la cohésion vers l'objectif.",
        argumentation:"Niveau A — Le pilotage a bien fonctionné et l'équipe a tenu le rythme. À améliorer : formaliser le suivi avec des comptes-rendus et un tableau de bord partagé pour que tout le monde ait la même vision.",
        niveau_lettre:"A",
        photos:["AC3501_1","AC3501_2","AC3501_3","AC3501_4","AC3501_5"]
      },
      {
        code:"AC35.02",
        titre:"Maîtriser la qualité en projet Web ou multimédia",
        realisation:"Management",
        ma_part:"", justification:"", argumentation:"",
        photos:["AC3502_1","AC3502_2","AC3502_3","AC3502_4","AC3502_5"]
      },
      {
        code:"AC35.03",
        titre:"Concevoir un projet d'entreprise innovante en définissant le nom, l'identité, la forme juridique et le ton de la marque",
        realisation:"Entreprise de location de matériel multimédia",
        ma_part:"Co-conception : nom, statut juridique, identité visuelle, offre et ton de la marque.",
        justification:"Tous les critères de l'AC ont été couverts : choix du statut (SAS), création de l'identité visuelle, définition de l'offre et du ton ciblant les créateurs de contenu.",
        argumentation:"Niveau B — Projet complet mais perfectible. La répartition des tâches était déséquilibrée et le volet financement manquait de profondeur. À travailler : un vrai prévisionnel chiffré et une étude de marché structurée.",
        niveau_lettre:"B",
        photos:["AC3503_1","AC3503_2","AC3503_3","AC3503_4","AC3503_5"]
      },
      {
        code:"C35.04",
        titre:"Défendre un projet de manière convaincante",
        realisation:"Soutenance — projet Nach !",
        ma_part:"Apport d'idées, construction de l'argumentaire et prise de parole devant jury.",
        justification:"J'ai participé à structurer la présentation et à répondre aux questions critiques du jury, en défendant nos choix avec des arguments concrets.",
        argumentation:"Exercice exigeant et enrichissant. Devoir anticiper les objections m'a forcé à maîtriser le projet dans sa globalité. À améliorer : la fluidité à l'oral sans support et la gestion des questions imprévues.",
        niveau_lettre:"",
        photos:["C3504_1","C3504_2","C3504_3","C3504_4","C3504_5"]
      }
    ]
  },
  {
    id:"soft", cls:"soft",
    eyebrow:"Compétences métiers & soft skills",
    title:"Savoir-être en entreprise",
    niveau:"À formuler avec tuteur·trice entreprise",
    acs:[
      {
        code:"Travail d'équipe",
        titre:"Travail d'équipe",
        realisation:"Rapport d'activités 2025",
        ma_part:"Coordination avec les conseillers, mise en page et rédaction.",
        justification:"J'ai collecté les informations auprès de plusieurs interlocuteurs et produit le rapport en intégrant leurs retours tout au long du processus.",
        argumentation:"J'ai appris l'importance des points d'étape réguliers pour aligner tout le monde. Reformuler des infos techniques pour un document grand public a aussi été un vrai exercice.",
        niveau_lettre:"",
        photos:["EQUIPE_1","EQUIPE_2","EQUIPE_3","EQUIPE_4","EQUIPE_5"]
      },
      {
        code:"Polyvalence",
        titre:"Polyvalence",
        realisation:"Communication digitale + développement du site web",
        ma_part:"Création des visuels, gestion des réseaux sociaux, développement et mise en ligne du site.",
        justification:"J'ai alterné entre création graphique, rédaction de contenus et développement web complet, sur des temporalités différentes et avec des interlocuteurs distincts.",
        argumentation:"Jongler entre des registres très différents m'a appris à m'organiser et à prioriser. L'axe de progression : approfondir chaque domaine (SEO, motion design, performance web) plutôt que rester en surface.",
        niveau_lettre:"",
        photos:["POLY_1","POLY_2","POLY_3","POLY_4","POLY_5"]
      }
    ]
  }
];

let activeCat=0, activeAc=0;

function renderBinder(){
  const binder=document.getElementById('binder');
  binder.innerHTML='<p class="binder-label">Compétences</p>'+DATA.map((cat,i)=>`
    <button class="tab ${cat.cls} ${i===activeCat?'active':''}" data-cat="${i}">
      <span class="tab-eyebrow">${cat.eyebrow}</span>${cat.title}
    </button>`).join('');
  binder.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>{
    activeCat=parseInt(btn.dataset.cat);activeAc=0;renderAll();
  }));
}

function renderContent(){
  const cat=DATA[activeCat];
  const content=document.getElementById('content');
  const navHtml=cat.acs.map((ac,i)=>{
    const isEmpty=!ac.realisation&&!ac.justification;
    return `<button class="ac-pill ${cat.cls} ${i===activeAc?'active':''} ${isEmpty?'empty':''}" data-ac="${i}">${ac.code}</button>`;
  }).join('');

  const ac=cat.acs[activeAc];
  const isEmpty=!ac.realisation&&!ac.justification;

  const photos=(ac.photos||[]).map(name=>{
    const ext=['jpg','jpeg','png','webp'];
    // On tente jpg par défaut ; si le fichier n'existe pas le navigateur affiche rien
    return `<div class="photo-slot">
      <img src="images/${name}.png" alt="${name}" onerror="this.parentElement.classList.add('broken')">
    </div>`;
  }).join('');

  const photoBlock=`
    <div class="photos-section">
      <div class="field-label">Illustrations</div>
      <div class="photo-grid">${photos}</div>
      <p class="photo-hint">Placez vos photos dans le dossier <code>images/</code> avec les noms indiqués ci-dessus.</p>
    </div>`;

  let cardContent;
  if(isEmpty){
    cardContent=`<div class="ac-card">
      <p class="ac-code" style="color:var(--${cat.cls})">${ac.code}</p>
      <h3>${ac.titre}</h3>
      <div class="empty-state">Pas encore de réalisation associée à cet AC. À compléter prochainement.</div>
      ${photoBlock}
    </div>`;
  } else {
    const badge=ac.niveau_lettre?`<span class="niveau-badge ${ac.niveau_lettre.toLowerCase()}">Niveau ${ac.niveau_lettre}</span>`:'';
    cardContent=`<div class="ac-card">
      <p class="ac-code" style="color:var(--${cat.cls})">${ac.code}</p>
      <h3>${ac.titre}</h3>
      <div class="field">
        <div class="field-label">Réalisation</div>
        <div class="field-value">${ac.realisation}</div>
      </div>
      ${ac.ma_part?`<div class="field"><div class="field-label">Ma part</div><div class="field-value">${ac.ma_part}</div></div>`:''}
      <div class="field">
        <div class="field-label">En quoi cela illustre l'AC</div>
        <div class="field-value ${!ac.justification?'empty':''}">${ac.justification||'À compléter.'}</div>
      </div>
      <div class="field">
        <div class="field-label">Niveau atteint &amp; progression</div>
        ${badge?`<div>${badge}</div>`:''}
        <div class="field-value ${!ac.argumentation?'empty':''}" style="${badge?'margin-top:6px':''}">
          ${ac.argumentation||'À compléter.'}
        </div>
      </div>
      ${photoBlock}
    </div>`;
  }

  content.innerHTML=`
    <div class="cat-header">
      <p class="cat-eyebrow" style="color:var(--${cat.cls})">${cat.eyebrow}</p>
      <h2>${cat.title}</h2>
      <p class="niv">${cat.niveau}</p>
    </div>
    <div class="ac-nav">${navHtml}</div>
    ${cardContent}`;

  content.querySelectorAll('.ac-pill').forEach(pill=>pill.addEventListener('click',()=>{
    activeAc=parseInt(pill.dataset.ac);renderContent();
  }));
}

function renderAll(){renderBinder();renderContent();}
renderAll();
</script>
</body>
</html>
